services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: archive
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive -d archive"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: ${WORKER_IMAGE:?WORKER_IMAGE is required}
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    image: ${BOT_IMAGE:?BOT_IMAGE is required}
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
